services:
  - type: web
    name: lunafemcare-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false   # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
